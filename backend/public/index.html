<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Thinking Lab</title>
    <style>
        /* 变量定义：严格执行配色规则 */
        :root {
            --bg-color: #fdf3c7;
            --text-main: #392214;
            --btn-main: #c63870;
            --btn-hover: #a82e5f;
            --border-light: #e8d8a0;
            --border-focus: #c63870;
            --text-muted: #8a7058;
            --card-bg: #ffffff;
            --shadow: 0 4px 15px rgba(57, 34, 20, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .lab-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 20px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            resize: none;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 20px;
        }

        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(198, 56, 112, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background-color: var(--btn-main);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(198, 56, 112, 0.2);
        }

        button:hover {
            background-color: var(--btn-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        #result-card {
            display: none; /* 初始隐藏 */
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            text-align: left;
            animation: fadeIn 0.4s ease-out;
            white-space: pre-wrap; /* 保留换行 */
        }

        #result-content {
            font-size: 1rem;
            color: var(--text-main);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h1>Critical Thinking Lab</h1>
            <p class="subtitle">Challenge your assumptions</p>
        </header>

        <section class="lab-box">
            <textarea id="userInput" placeholder="Enter an argument or belief here (at least 10 characters)..."></textarea>
            
            <div class="button-group">
                <button onclick="analyze('findAssumptions')">Find Assumptions</button>
                <button onclick="analyze('challengeLogic')">Challenge Logic</button>
                <button onclick="analyze('counterargument')">Generate Counterargument</button>
            </div>
        </section>

        <article id="result-card">
            <div id="result-content"></div>
        </article>
    </main>

    <script>
        const API_URL = '/.netlify/functions/server/api/analyze';
        const resultContent = document.getElementById('result-content');
        const resultCard = document.getElementById('result-card');
        const userInput = document.getElementById('userInput');

        async function analyze(type) {
            const text = userInput.value.trim();

            if (text.length < 10) {
                alert('Please enter at least 10 characters to perform a meaningful analysis.');
                return;
            }

            // UI 状态更新
            resultCard.style.display = 'block';
            resultContent.innerHTML = '<span class="loading-dots">Analysing</span>';
            toggleButtons(true);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, type })
                });

                const data = await response.json();

                if (data.error) {
                    resultContent.innerHTML = `<span style="color: #c63870;">Error: ${data.error}</span>`;
                } else {
                    resultContent.textContent = data.result;
                }
            } catch (err) {
                resultContent.innerHTML = `<span style="color: #c63870;">Server Error: Could not connect to the lab backend.</span>`;
            } finally {
                toggleButtons(false);
            }
        }

        function toggleButtons(disabled) {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = disabled);
        }
    </script>
</body>
</html>
